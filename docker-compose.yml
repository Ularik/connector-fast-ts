services:

  # Наш Django проект
  connector-app:
    image: ularchik/connector-fast-ts
    env_file:
      - .env
    command:
      "uvicorn src.main:app --host 0.0.0.0 --workers 4"
    expose:
      - "8000"
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - connector-app
    restart: always


